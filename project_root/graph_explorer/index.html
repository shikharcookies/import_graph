<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dependency Graph Explorer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="top-bar">
        <h1>Dependency Graph Explorer</h1>
        <div class="controls">
            <input type="file" id="upload-json" accept=".json">
            <input type="text" id="search-box" placeholder="Search for a file (e.g. abc.py)...">
        </div>
        <div class="stats">
            <span id="folder-count"></span> folders, <span id="file-count"></span> files
        </div>
    </div>
    <div class="container">
        <div class="sidebar">
            <h2>Node Details</h2>
            <div id="node-details"></div>
        </div>
        <div class="main-canvas">
            <div id="breadcrumb"></div>
            <svg id="graph"></svg>
        </div>
    </div>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
